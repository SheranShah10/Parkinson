version: '3.8'

services:
  training:
    build:
      context: .
      dockerfile: Dockerfile
    image: parkinson-benchmark:latest
    container_name: parkinson_training
    volumes:
      - ./data:/app/data
      - ./experiments:/app/experiments
      - ./saved_models:/app/saved_models
      - ./logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["python", "scripts/train.py"]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.5.0
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - ./logs/mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --default-artifact-root /mlruns
      --host 0.0.0.0
